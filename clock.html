<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            color: #fff;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            font-size: 1.1em;
            color: #aaa;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .clock-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            color: #fff;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }
        
        .clock-card:hover {
            border-color: rgba(102, 126, 234, 0.8);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.2);
            transform: translateY(-5px);
        }
        
        .timezone-name {
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .time-display {
            font-size: 2.5em;
            font-weight: bold;
            color: #fff;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }
        
        .date-display {
            font-size: 0.95em;
            color: #aaa;
            margin-bottom: 10px;
        }
        
        .offset {
            font-size: 0.9em;
            color: #764ba2;
            padding: 8px 12px;
            background: rgba(118, 75, 162, 0.2);
            border-radius: 5px;
            display: inline-block;
            margin-top: 10px;
        }
        
        .day-night {
            font-size: 3em;
            margin: 10px 0;
        }
        
        .add-timezone {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px dashed rgba(102, 126, 234, 0.5);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .add-timezone:hover {
            border-color: rgba(102, 126, 234, 0.8);
            background: rgba(102, 126, 234, 0.1);
        }
        
        .add-timezone h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        
        .timezone-selector {
            width: 100%;
            padding: 10px;
            background: #0f0c29;
            color: #fff;
            border: 2px solid #667eea;
            border-radius: 5px;
            font-size: 0.95em;
            margin-top: 10px;
            cursor: pointer;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }
        
        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #0f0c29;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #667eea;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            color: #fff;
        }
        
        .modal-content h2 {
            margin-bottom: 20px;
            color: #667eea;
        }
        
        .timezone-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .timezone-option {
            padding: 12px;
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }
        
        .timezone-option:hover {
            background: rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }
        
        .close-modal {
            float: right;
            font-size: 2em;
            font-weight: bold;
            cursor: pointer;
            color: #667eea;
        }
        
        .close-modal:hover {
            color: #764ba2;
        }
        
        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.3);
            border: none;
            color: #ff6b6b;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s;
        }
        
        .remove-btn:hover {
            background: rgba(255, 0, 0, 0.6);
        }
        
        .clock-card {
            position: relative;
        }
        
        .format-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .format-btn {
            padding: 8px 15px;
            background: rgba(102, 126, 234, 0.2);
            border: 2px solid rgba(102, 126, 234, 0.5);
            color: #667eea;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        
        .format-btn.active {
            background: #667eea;
            color: #fff;
            border-color: #667eea;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .time-display {
                font-size: 1.8em;
            }
            
            .clock-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🕐 Digital Clock</h1>
            <p>Multiple Time Zones Around the World</p>
        </div>
        
        <div class="format-toggle">
            <button class="format-btn active" onclick="setFormat('12')">12 Hour</button>
            <button class="format-btn" onclick="setFormat('24')">24 Hour</button>
        </div>
        
        <div class="controls">
            <button class="btn" onclick="openTimezoneModal()">+ Add Time Zone</button>
            <button class="btn" onclick="resetToDefault()">🔄 Reset</button>
        </div>
        
        <div class="clock-grid" id="clockGrid">
            <!-- Clocks will be added here -->
        </div>
    </div>
    
    <!-- Modal for selecting timezone -->
    <div id="timezoneModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeTimezoneModal()">&times;</span>
            <h2>Select a Time Zone</h2>
            <div class="timezone-list" id="timezoneList">
                <!-- Timezones will be added here -->
            </div>
        </div>
    </div>
    
    <script>
        const timezones = [
            { name: 'UTC', offset: 'UTC+0', tzName: 'UTC' },
            { name: 'London', offset: 'UTC+0', tzName: 'Europe/London' },
            { name: 'Paris', offset: 'UTC+1', tzName: 'Europe/Paris' },
            { name: 'Dubai', offset: 'UTC+4', tzName: 'Asia/Dubai' },
            { name: 'India', offset: 'UTC+5:30', tzName: 'Asia/Kolkata' },
            { name: 'Bangkok', offset: 'UTC+7', tzName: 'Asia/Bangkok' },
            { name: 'Hong Kong', offset: 'UTC+8', tzName: 'Asia/Hong_Kong' },
            { name: 'Tokyo', offset: 'UTC+9', tzName: 'Asia/Tokyo' },
            { name: 'Sydney', offset: 'UTC+10', tzName: 'Australia/Sydney' },
            { name: 'Los Angeles', offset: 'UTC-8', tzName: 'America/Los_Angeles' },
            { name: 'New York', offset: 'UTC-5', tzName: 'America/New_York' },
            { name: 'Chicago', offset: 'UTC-6', tzName: 'America/Chicago' },
            { name: 'Denver', offset: 'UTC-7', tzName: 'America/Denver' },
            { name: 'Mexico City', offset: 'UTC-6', tzName: 'America/Mexico_City' },
            { name: 'Sao Paulo', offset: 'UTC-3', tzName: 'America/Sao_Paulo' },
            { name: 'Toronto', offset: 'UTC-5', tzName: 'America/Toronto' },
            { name: 'Singapore', offset: 'UTC+8', tzName: 'Asia/Singapore' },
            { name: 'Istanbul', offset: 'UTC+3', tzName: 'Europe/Istanbul' },
            { name: 'Moscow', offset: 'UTC+3', tzName: 'Europe/Moscow' },
            { name: 'Seoul', offset: 'UTC+9', tzName: 'Asia/Seoul' },
        ];
        
        let selectedTimezones = ['UTC', 'Asia/Kolkata', 'Europe/London', 'America/New_York', 'Asia/Tokyo'];
        let timeFormat = '12'; // 12 or 24 hour format
        
        function openTimezoneModal() {
            const modal = document.getElementById('timezoneModal');
            const list = document.getElementById('timezoneList');
            list.innerHTML = '';
            
            timezones.forEach(tz => {
                const div = document.createElement('div');
                div.className = 'timezone-option';
                div.textContent = `${tz.name} (${tz.offset})`;
                div.onclick = () => {
                    if (!selectedTimezones.includes(tz.tzName)) {
                        selectedTimezones.push(tz.tzName);
                        updateClocks();
                    }
                    closeTimezoneModal();
                };
                list.appendChild(div);
            });
            
            modal.classList.add('active');
        }
        
        function closeTimezoneModal() {
            document.getElementById('timezoneModal').classList.remove('active');
        }
        
        function setFormat(format) {
            timeFormat = format;
            document.querySelectorAll('.format-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateClocks();
        }
        
        function getTimeInTimezone(tzName) {
            const now = new Date();
            const time = new Date(now.toLocaleString('en-US', { timeZone: tzName }));
            return time;
        }
        
        function formatTime(date, format) {
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            
            if (format === '12') {
                let hour12 = date.getHours() % 12;
                if (hour12 === 0) hour12 = 12;
                const ampm = date.getHours() >= 12 ? 'PM' : 'AM';
                return `${String(hour12).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
            } else {
                return `${hours}:${minutes}:${seconds}`;
            }
        }
        
        function getDayNightEmoji(date) {
            const hour = date.getHours();
            if (hour >= 5 && hour < 12) return '🌅';
            if (hour >= 12 && hour < 17) return '☀️';
            if (hour >= 17 && hour < 21) return '🌅';
            return '🌙';
        }
        
        function getTimezoneName(tzName) {
            const tz = timezones.find(t => t.tzName === tzName);
            return tz ? tz.name : tzName;
        }
        
        function removeTimezone(tzName) {
            selectedTimezones = selectedTimezones.filter(tz => tz !== tzName);
            updateClocks();
        }
        
        function updateClocks() {
            const grid = document.getElementById('clockGrid');
            grid.innerHTML = '';
            
            selectedTimezones.forEach(tzName => {
                const time = getTimeInTimezone(tzName);
                const card = document.createElement('div');
                card.className = 'clock-card';
                
                const tz = timezones.find(t => t.tzName === tzName);
                const name = tz ? tz.name : tzName;
                const offset = tz ? tz.offset : 'UTC';
                
                card.innerHTML = `
                    ${selectedTimezones.length > 1 ? `<button class="remove-btn" onclick="removeTimezone('${tzName}')">Remove</button>` : ''}
                    <div class="timezone-name">${name}</div>
                    <div class="day-night">${getDayNightEmoji(time)}</div>
                    <div class="time-display">${formatTime(time, timeFormat)}</div>
                    <div class="date-display">${time.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
                    <div class="offset">${offset}</div>
                `;
                grid.appendChild(card);
            });
        }
        
        function resetToDefault() {
            selectedTimezones = ['UTC', 'Asia/Kolkata', 'Europe/London', 'America/New_York', 'Asia/Tokyo'];
            timeFormat = '12';
            document.querySelectorAll('.format-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.format-btn').classList.add('active');
            updateClocks();
        }
        
        // Update clocks every second
        setInterval(updateClocks, 1000);
        
        // Initial update
        updateClocks();
    </script>
</body>
</html>
